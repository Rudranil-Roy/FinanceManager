spring:
  application:
    name: FinanceManager
  datasource:
    url: jdbc:h2:mem:financedb
    driverClassName: org.h2.Driver
    username: appmanager
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always

server:
  servlet:
    session:
      cookie:
        secure: ${SECURE_COOKIES:false}
        http-only: true
        same-site: strict
