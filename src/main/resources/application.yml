spring:
  application:
    name: FinanceManager

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict

app:
  cors:
    allowed-origins: http://localhost:5173